<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="./assets/images/calculator-favicon.png"
      type="image/x-icon"
    />
    <!-- SEO meta tags for Search Optimization -->
    <meta
      name="description"
      content="A simple calculator web application for basic arithmetic operations."
    />
    <meta
      name="keywords"
      content="calculator, web, application, arithmetic, operations"
    />
    <meta name="author" content="Ubaidullah" />
    <meta name="robots" content="index, follow" />
    <meta name="title" content="Calculator Web Application" />
    <!-- Open Graph meta tags for social media sharing -->
    <meta property="og:title" content="Calculator Web Application" />
    <meta
      property="og:description"
      content="A simple calculator web application for basic arithmetic operations."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://calculator-nine-orpin-70.vercel.app/" />
    <meta
      property="og:image"
      content="https://calculator-nine-orpin-70.vercel.app/assets/images/calculator-preview.png"
    />
    <title>Calculator</title>
    <link rel="stylesheet" href="/assets/css/style.css" />
  </head>
  <body>
    <div class="calculator">
      <!-- input field to display the result -->
      <input type="text" readonly id="display" value="0" />

      <!-- calculator buttons -->
      <div class="btn-div">
        <button class="btn top-btn" onclick="clearDisplay()">AC</button>
        <button class="btn top-btn" onclick="clearOne()">&larr;</button>
        <button class="btn top-btn" onclick="appendCalc('%')">%</button>
        <button class="btn right-btn" onclick="appendCalc('/')">
          &divide;
        </button>
        <button class="btn" onclick="appendCalc('7')">7</button>
        <button class="btn" onclick="appendCalc('8')">8</button>
        <button class="btn" onclick="appendCalc('9')">9</button>
        <button class="btn right-btn" onclick="appendCalc('*')">&times;</button>
        <button class="btn" onclick="appendCalc('4')">4</button>
        <button class="btn" onclick="appendCalc('5')">5</button>
        <button class="btn" onclick="appendCalc('6')">6</button>
        <button class="btn right-btn" onclick="appendCalc('-')">-</button>
        <button class="btn" onclick="appendCalc('1')">1</button>
        <button class="btn" onclick="appendCalc('2')">2</button>
        <button class="btn" onclick="appendCalc('3')">3</button>
        <button class="btn right-btn" onclick="appendCalc('+')">+</button>
        <button class="btn" onclick="appendCalc('00')">00</button>
        <button class="btn" onclick="appendCalc('0')">0</button>
        <button class="btn" onclick="appendCalc('.')">.</button>
        <button class="btn right-btn" onclick="displayCalc()">=</button>
      </div>
    </div>

    <footer class="footer">
      <p>&copy; 2025 Calculator. All rights reserved.</p>
      <p>Designed and developed by Ubaidullah.</p>
    </footer>

    <script src="/assets/js/script.js"></script>
  </body>
</html>
